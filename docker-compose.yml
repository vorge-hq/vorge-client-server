services:
  db:
    image: postgres:16
    container_name: vantage-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vantage}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - vantage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    container_name: vantage-server
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-4000}:4000"

  client:
    container_name: vantage-client
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_ENABLE_DEMO: ${VITE_ENABLE_DEMO:-false}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-5173}:5173"

volumes:
  vantage_pgdata:
